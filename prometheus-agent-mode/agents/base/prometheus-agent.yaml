# Base PrometheusAgent — overlays patch: name, nodeSelector, externalLabels, scrapeClasses regex
apiVersion: monitoring.coreos.com/v1alpha1
kind: PrometheusAgent
metadata:
  name: prometheus-agent
  namespace: monitoring
spec:
  replicas: 1
  serviceAccountName: prometheus-agent
  # -- AZ-aware scrape filtering via default scrapeClass --
  # The overlay patches the regex with the target AZ value.
  # Supports kubernetes_sd (pod annotation + label + node label) and ec2_sd (availability zone meta).
  scrapeClasses:
    - name: az-filter
      default: true
      relabelings:
        - sourceLabels:
            - __meta_kubernetes_pod_annotation_topology_kubernetes_io_zone
            - __meta_kubernetes_pod_label_topology_kubernetes_io_zone
            - __meta_ec2_availability_zone
          regex: ".*PLACEHOLDER.*"
          action: keep
    - name: az-filter-kubelet
      default: false
      authorization:
        type: Bearer
        credentialsFile: /var/run/secrets/kubernetes.io/serviceaccount/token
      tlsConfig:
        caFile: "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
        insecureSkipVerify: true
      relabelings:
        - sourceLabels:
            - __meta_kubernetes_node_label_topology_kubernetes_io_zone
          regex: "PLACEHOLDER"
          action: keep
  # Pin agent to its AZ — overlay patches the zone value
  nodeSelector:
    topology.kubernetes.io/zone: PLACEHOLDER
  externalLabels:
    cluster: playground
    availability_zone: PLACEHOLDER
  # Discover all ServiceMonitors and PodMonitors
  serviceMonitorSelector: {}
  serviceMonitorNamespaceSelector: {}
  podMonitorSelector: {}
  podMonitorNamespaceSelector: {}
  # Discover ScrapeConfigs (e.g. kubelet via node role)
  scrapeConfigSelector: {}
  scrapeConfigNamespaceSelector: {}
  # Remote-write to the centralized Prometheus TSDB
  remoteWrite:
    - url: http://prometheus-server.monitoring.svc.cluster.local:9090/api/v1/write
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi
