---
# HTTPRoute — prometheus.127.0.0.1.nip.io -> prometheus-server:9090
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: prometheus-server
  namespace: monitoring
spec:
  parentRefs:
    - name: playground
      namespace: envoy-gateway-system
  hostnames:
    - "prometheus.127.0.0.1.nip.io"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: prometheus-server
          port: 9090
---
# HTTPRoute — alertmanager.127.0.0.1.nip.io -> alertmanager:9093
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: alertmanager
  namespace: monitoring
spec:
  parentRefs:
    - name: playground
      namespace: envoy-gateway-system
  hostnames:
    - "alertmanager.127.0.0.1.nip.io"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: kube-prometheus-stack-alertmanager
          port: 9093
