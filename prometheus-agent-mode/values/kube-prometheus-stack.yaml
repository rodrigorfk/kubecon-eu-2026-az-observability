# Operator + CRDs + default ServiceMonitors/PodMonitors.
# Prometheus, Alertmanager, and Grafana are managed separately.

crds:
  enabled: true

prometheusOperator:
  enabled: true

# Disabled — we manage our own Prometheus server and per-AZ agents
prometheus:
  enabled: false

alertmanager:
  enabled: false

grafana:
  enabled: false

# Scrape targets
nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true

# Keep default ServiceMonitors and PrometheusRules — the per-AZ agents
# will pick them up automatically via serviceMonitorSelector: {}
defaultRules:
  create: true

kubeApiServer:
  enabled: true

kubelet:
  enabled: true

kubeControllerManager:
  enabled: true

coreDns:
  enabled: true

kubeEtcd:
  enabled: true

kubeScheduler:
  enabled: true

kubeProxy:
  enabled: true
