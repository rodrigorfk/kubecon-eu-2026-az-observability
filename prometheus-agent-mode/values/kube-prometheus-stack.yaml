# Operator + CRDs + default ServiceMonitors/PodMonitors.
# Prometheus, Alertmanager, and Grafana are managed separately.

crds:
  enabled: true

prometheusOperator:
  enabled: true
  # Disable kubelet Endpoints/EndpointSlice sync — we use ScrapeConfigs
  # with kubernetes_sd node role instead of a ServiceMonitor for kubelet.
  kubeletService:
    enabled: false

# Disabled — we manage our own Prometheus server and per-AZ agents
prometheus:
  enabled: false

alertmanager:
  enabled: true

grafana:
  enabled: false

# Scrape targets
nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true

# Keep default ServiceMonitors and PrometheusRules — the per-AZ agents
# will pick them up automatically via serviceMonitorSelector: {}
defaultRules:
  create: true

kubeApiServer:
  enabled: true

# Disabled — kubelet Endpoints/EndpointSlices don't carry topology labels,
# so the AZ-aware scrapeClass cannot filter them. We use a ScrapeConfig with
# kubernetes_sd node role instead (see base/scrapeconfig-kubelet.yaml).
kubelet:
  enabled: false

kubeControllerManager:
  enabled: true

coreDns:
  enabled: true

kubeEtcd:
  enabled: true

kubeScheduler:
  enabled: true

kubeProxy:
  enabled: true
