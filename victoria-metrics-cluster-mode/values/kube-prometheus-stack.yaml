# Operator + CRDs + default ServiceMonitors/PodMonitors/PrometheusRules.
# Prometheus, Alertmanager, and Grafana are managed separately.
# The victoriametrics-operator auto-converts prometheus-operator CRDs
# (ServiceMonitor → VMServiceScrape, PrometheusRule → VMRule, etc.).

crds:
  enabled: true

prometheusOperator:
  enabled: true
  # Disable kubelet Endpoints/EndpointSlice sync — we use VMNodeScrape
  # with kubernetes_sd node role instead of a ServiceMonitor for kubelet.
  kubeletService:
    enabled: false

# Disabled — we manage our own VM instances via kustomize
prometheus:
  enabled: false

alertmanager:
  enabled: true

grafana:
  enabled: false

# Scrape targets
nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true

# Keep default PrometheusRules — the victoriametrics-operator auto-converts
# them to VMRules, which VMAlert evaluates.
defaultRules:
  create: true

kubeApiServer:
  enabled: true

# Disabled — kubelet Endpoints/EndpointSlices don't carry topology labels,
# so AZ-aware filtering is impossible. We use VMNodeScrape instead
# (see base/vmnodescrape-kubelet.yaml).
kubelet:
  enabled: false

kubeControllerManager:
  enabled: true

coreDns:
  enabled: true

kubeEtcd:
  enabled: true

kubeScheduler:
  enabled: true

kubeProxy:
  enabled: true
