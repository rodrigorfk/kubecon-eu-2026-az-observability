# Federated vmselect — multi-level cluster setup.
# Uses -storageNode pointing to per-AZ vmselect services on their
# clusternative port (8401). The per-AZ vmselects expose this port
# via -clusternativeListenAddr and query their local vmstorage.
# See: https://docs.victoriametrics.com/victoriametrics/cluster-victoriametrics/#multi-level-cluster-setup
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vmselect-federated
  namespace: monitoring
  labels:
    app: vmselect-federated
spec:
  replicas: 3
  selector:
    matchLabels:
      app: vmselect-federated
  template:
    metadata:
      labels:
        app: vmselect-federated
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: vmselect-federated
      containers:
        - name: vmselect
          image: victoriametrics/vmselect:v1.137.0-cluster
          args:
            - "-storageNode=vmselect-vm-eu-west-1a-vmcluster.monitoring.svc.cluster.local:8401,vmselect-vm-eu-west-1b-vmcluster.monitoring.svc.cluster.local:8401,vmselect-vm-eu-west-1c-vmcluster.monitoring.svc.cluster.local:8401"
            - "-httpListenAddr=:8481"
          ports:
            - name: http
              containerPort: 8481
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          env:
            - name: GOMAXPROCS
              value: "1"
            - name: GOMEMLIMIT
              valueFrom:
                resourceFieldRef:
                  resource: limits.memory
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: vmselect-federated
  namespace: monitoring
spec:
  type: ClusterIP
  trafficDistribution: PreferClose
  selector:
    app: vmselect-federated
  ports:
    - name: http
      port: 8481
      targetPort: 8481
