# Per-AZ vmselect HTTPRoute — overlays patch: hostname and backendRef name
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vmselect
  namespace: monitoring
spec:
  parentRefs:
    - name: playground
      namespace: envoy-gateway-system
  hostnames:
    - "vmselect-PLACEHOLDER.127.0.0.1.nip.io"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: vmselect-PLACEHOLDER
          port: 8481
