apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namePrefix: "zone-a-"

resources:
  - ../../base

patches:
  - target:
      kind: VMAgent
      name: vmagent
    patch: |
      - op: replace
        path: /spec/nodeSelector/topology.kubernetes.io~1zone
        value: eu-west-1a
      - op: replace
        path: /spec/externalLabels/availability_zone
        value: eu-west-1a
      - op: replace
        path: /spec/extraEnvs/3/value
        value: '|'
      - op: replace
        path: /spec/remoteWrite/0/url
        value: http://vminsert-vm-eu-west-1a-vmcluster.monitoring.svc.cluster.local:8480/insert/0/prometheus/api/v1/write
