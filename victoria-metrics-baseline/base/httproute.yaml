# HTTPRoute — vmselect.127.0.0.1.nip.io -> vmselect-vm-baseline:8481
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vmselect
  namespace: monitoring
spec:
  parentRefs:
    - name: playground
      namespace: envoy-gateway-system
  hostnames:
    - "vmselect.127.0.0.1.nip.io"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: vmselect-vm-baseline
          port: 8481
---
